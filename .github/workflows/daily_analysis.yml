name: 每日股票分析

on:
  schedule:
    - cron: '*/10 * * * *'  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 使用你在 Secrets 存好的万能钥匙
          token: ${{ secrets.MY_PUSH_TOKEN }}
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 创建目录
        run: mkdir -p data logs reports docs
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_RUN_ARG="--force-run"; fi
          python main.py $FORCE_RUN_ARG
      
      - name: 自动提交并强制推送
        env:
          MY_TOKEN: ${{ secrets.MY_PUSH_TOKEN }}
        run: |
          # 1. 配置身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. 检查是否有报告生成 (调试用)
          echo "检查生成的报告文件："
          ls -R reports/
          
          # 3. 添加文件
          git add reports/ logs/ docs/ 2>/dev/null || true
          
          # 4. 提交
          # 如果没有变化就提示并结束，不报错
          if git diff --staged --quiet; then
            echo "没有发现任何新文件变动，跳过推送。"
            exit 0
          fi
          
          git commit -m "📊 自动更新分析报告 [skip ci]"
          
          # 5. 强制推送 (解决权限无法在网页开启的问题)
          # 注意：这里会自动识别你的仓库地址并注入令牌
          git push https://${{ secrets.MY_PUSH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --force
