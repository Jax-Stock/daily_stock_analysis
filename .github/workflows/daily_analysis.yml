name: 每日股票分析

on:
  schedule:
    - cron: '*/10 * * * *'  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

# 并发控制：同一时间只运行一个分析任务
concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 强制声明权限（双重保险）
    permissions:
      contents: write
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 使用你配置在 Secrets 中的个人访问令牌（PAT）
          token: ${{ secrets.MY_PUSH_TOKEN }}
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 创建目录
        run: mkdir -p data logs reports docs
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_RUN_ARG="--force-run"; fi
          python main.py $FORCE_RUN_ARG
      
      - name: 上传 Artifacts 备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: |
            reports/
            logs/
          retention-days: 7
      
      - name: 自动提交分析报告并推送到仓库
        if: always()
        run: |
          # 配置 git 用户信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制添加生成的报告文件夹
          git add reports/ logs/ docs/ 2>/dev/null || echo "No changes to add"
          
          # 提交更改。如果是空提交（没有新文件），则 exit 0 保证 workflow 依然显示为绿色成功
          git commit -m "📊 自动更新每日股票分析报告 [skip ci]" || exit 0
          
          # 使用 PAT 后，这里的 push 将具备你的个人写权限
          git push origin main
