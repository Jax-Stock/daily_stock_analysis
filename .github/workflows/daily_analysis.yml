name: 每日股票分析

on:
  schedule:
    - cron: '*/10 * * * *'  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 创建目录
        run: mkdir -p data logs reports docs
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_RUN_ARG="--force-run"; fi
          python main.py $FORCE_RUN_ARG
      
      - name: 上传备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports
          path: |
            reports/
            logs/
          retention-days: 7
      
      - name: 自动提交并推送到仓库
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: update daily reports [skip ci]" || exit 0
          git push
