name: 每日股票分析

on:
  schedule:
    - cron: '*/10 * * * *'  
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: true # 发现新任务时，取消正在运行的旧任务，解决端口占用

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PUSH_TOKEN }}
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: 清理可能存在的残留进程
        run: |
          fuser -k 8000/tcp || true
      
      - name: 执行股票分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
        run: |
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then FORCE_RUN_ARG="--force-run"; fi
          python main.py $FORCE_RUN_ARG
      
      - name: 验证文件生成
        run: |
          echo "==== 检查报告目录 ===="
          ls -R reports/
          if [ -z "$(ls -A reports/ 2>/dev/null)" ]; then
            echo "错误：reports 文件夹是空的，没有生成任何报告！"
            exit 1
          fi
      
      - name: 自动提交并强制推送
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add reports/ logs/ docs/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "无文件变动，跳过推送。"
            exit 0
          fi
          
          git commit -m "📊 自动更新分析报告 [skip ci]"
          git push https://${{ secrets.MY_PUSH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --force
